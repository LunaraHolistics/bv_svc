name: Merge Prestadores CSV+KML

on:
  # Roda manualmente pelo GitHub
  workflow_dispatch:
    inputs:
      log_level:
        description: 'Nível de log'
        required: false
        default: 'info'
  
  # Roda automaticamente quando houver push na main (opcional)
  push:
    branches: [ main ]
    paths:
      - 'dados-jot.csv'
      - 'meu-mapa.kml'
      - 'scripts/merge-prestadores.js'

jobs:
  merge-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verificar arquivos de entrada
        run: |
          echo "📂 Verificando arquivos..."
          [ -f dados-jot.csv ] && echo "✅ dados-jot.csv encontrado" || echo "❌ dados-jot.csv não encontrado"
          [ -f meu-mapa.kml ] && echo "✅ meu-mapa.kml encontrado" || echo "❌ meu-mapa.kml não encontrado"

      - name: Executar script de merge
        run: node scripts/merge-prestadores.js

      - name: Commitar resultado gerado
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/prestadores-seed.json
          git diff --staged --quiet || git commit -m "chore: atualiza prestadores-seed.json via GitHub Actions [skip ci]"
          git push